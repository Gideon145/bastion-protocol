<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1a"/>
      <stop offset="100%" style="stop-color:#0d1525"/>
    </linearGradient>
    <linearGradient id="fire" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="50%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#7b61ff"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)" rx="20"/>

  <!-- Castle/Bastion silhouette -->
  <!-- Main tower -->
  <rect x="155" y="120" width="90" height="180" fill="none" stroke="url(#fire)" stroke-width="3" rx="4"/>
  <!-- Left tower -->
  <rect x="95" y="160" width="55" height="140" fill="none" stroke="url(#fire)" stroke-width="3" rx="4"/>
  <!-- Right tower -->
  <rect x="250" y="160" width="55" height="140" fill="none" stroke="url(#fire)" stroke-width="3" rx="4"/>
  <!-- Battlements main -->
  <rect x="152" y="112" width="96" height="16" fill="#0d1525" stroke="url(#fire)" stroke-width="3" rx="2"/>
  <line x1="160" y1="112" x2="160" y2="120" stroke="url(#fire)" stroke-width="3"/>
  <line x1="185" y1="112" x2="185" y2="120" stroke="url(#fire)" stroke-width="3"/>
  <line x1="210" y1="112" x2="210" y2="120" stroke="url(#fire)" stroke-width="3"/>
  <line x1="235" y1="112" x2="235" y2="120" stroke="url(#fire)" stroke-width="3"/>
  <!-- Battlements left -->
  <rect x="92" y="152" width="61" height="16" fill="#0d1525" stroke="url(#fire)" stroke-width="3" rx="2"/>
  <!-- Battlements right -->
  <rect x="247" y="152" width="61" height="16" fill="#0d1525" stroke="url(#fire)" stroke-width="3" rx="2"/>

  <!-- Shield in center -->
  <path d="M200 170 L230 185 L230 215 Q200 240 170 215 L170 185 Z" fill="none" stroke="#22c55e" stroke-width="2.5"/>

  <!-- Eye/watching icon in shield -->
  <ellipse cx="200" cy="198" rx="14" ry="10" fill="none" stroke="#00d4ff" stroke-width="2"/>
  <circle cx="200" cy="198" r="4" fill="#00d4ff"/>

  <!-- Scanning lines -->
  <line x1="120" y1="280" x2="280" y2="280" stroke="#22c55e" stroke-width="1" opacity="0.3"/>
  <line x1="130" y1="290" x2="270" y2="290" stroke="#22c55e" stroke-width="1" opacity="0.2"/>
  <line x1="140" y1="300" x2="260" y2="300" stroke="#22c55e" stroke-width="1" opacity="0.1"/>

  <!-- Title -->
  <text x="200" y="350" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="38" font-weight="bold" fill="#ffffff" letter-spacing="4">BASTION</text>
  <text x="200" y="382" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="14" fill="#22c55e" letter-spacing="6">PROTOCOL</text>
</svg>
